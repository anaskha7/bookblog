<!DOCTYPE html>
<html lang="es">

<head>

        body {

        .header {

            color: #1a1a1a;

        }

        .hero {
            padding: 60px 40px 40px;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff 0%, #faf9f6 100%);

        }

            transition: all 0.3s;
            display: inline-block;
        }

        .footer {

            font-size: 11px;
            color: #aaa;
            padding: 30px;
