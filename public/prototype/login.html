<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - BookBlog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Inter"', 'sans-serif'],
                        serif: ['"Playfair Display"', 'serif'],
                    },
                    colors: {
                        theme: {
                            bg: '#FFFBF5',
                            text: '#1C1917',
                            primary: '#A0522D',
                            secondary: '#F59E0B',
                            surface: '#FFFFFF',
                            muted: '#78716c'
                        }
                    }
                }
            }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        body {
            background-color: #FFFBF5;
            color: #1C1917;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- Elementos Decorativos de Fondo -->
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#FFDEE9] rounded-full blur-[120px] opacity-30 z-0">
    </div>
    <div
        class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#F5F5DC] rounded-full blur-[120px] opacity-40 z-0">
    </div>

    <!-- TARJETA DE LOGIN -->
    <div class="w-full max-w-md bg-white p-10 rounded-3xl shadow-2xl relative z-10 border border-[#E7E5E4]">
        <div class="text-center mb-10">
            <div
                class="w-12 h-12 bg-theme-primary rounded-xl flex items-center justify-center text-white mx-auto mb-4 shadow-lg rotate-3">
                <!-- Icono simple -->
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253">
                    </path>
                </svg>
            </div>
            <h2 class="text-3xl font-serif font-bold text-theme-text mb-2">Bienvenido</h2>
            <p class="text-theme-muted text-sm">Ingresa a tu cuenta para guardar tus lecturas.</p>
        </div>

        <form class="space-y-6">
            <div>
                <label class="block text-xs font-bold text-theme-text uppercase tracking-wider mb-2">Correo
                    Electrónico</label>
                <input type="email" placeholder="lector@ejemplo.com"
                    class="w-full bg-[#F5F5F4] border-transparent focus:bg-white focus:border-theme-primary focus:ring-0 rounded-xl px-4 py-3 transition-all outline-none">
            </div>

            <div>
                <label class="block text-xs font-bold text-theme-text uppercase tracking-wider mb-2">Contraseña</label>
                <input type="password" placeholder="••••••••"
                    class="w-full bg-[#F5F5F4] border-transparent focus:bg-white focus:border-theme-primary focus:ring-0 rounded-xl px-4 py-3 transition-all outline-none">
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="accent-theme-primary rounded">
                    <span class="text-theme-muted">Recordarme</span>
                </label>
                <a href="#" class="text-theme-primary font-medium hover:underline">¿Olvidaste tu contraseña?</a>
            </div>

            <button type="submit"
                class="w-full bg-theme-primary hover:bg-[#8B4513] text-white font-bold py-3.5 rounded-xl shadow-lg transition-transform hover:-translate-y-0.5">
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-8 text-center text-sm text-theme-muted">
            ¿No tienes cuenta? <a href="register.html" class="text-theme-primary font-bold hover:underline">Regístrate
                aquí</a>
        </div>

        <div class="mt-8 pt-6 border-t border-[#F5F5F4] text-center">
            <a href="index.html"
                class="text-xs text-theme-muted hover:text-theme-text transition-colors flex items-center justify-center gap-1">
                <span>&larr;</span> Volver al inicio
            </a>
        </div>
    </div>

</body>

</html>
